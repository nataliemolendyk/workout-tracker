<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Tracker</title>
  <link rel="stylesheet" href="css/tracker.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-content">
      <div class="header-logo">
        <h1>Workout Tracker</h1>
        <span>track your fitness</span>
      </div>
    </div>
  </header>

  <div class="container">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="profile">Profile</button>
      <button class="tab-btn" data-tab="plan">Plan</button>
      <button class="tab-btn" data-tab="schedule">Schedule</button>
      <button class="tab-btn" data-tab="library">Library</button>
    </div>

    <!-- Profile Tab -->
    <div id="tab-profile" class="tab-content active">
      <div class="card">
        <h2>Your Profile</h2>

        <!-- Height with unit toggle -->
        <div class="form-group">
          <label>Height</label>
          <div id="height-unit-buttons" class="unit-toggle">
            <button type="button" class="unit-btn active" data-unit="cm">cm</button>
            <button type="button" class="unit-btn" data-unit="ftin">ft/in</button>
          </div>
          <input type="number" id="height-cm" placeholder="e.g. 175" min="50" max="300" style="display:block;">
          <div id="height-ftin" style="display:none; gap:8px;">
            <input type="number" id="height-ft" placeholder="ft" min="1" max="8" style="width:70px;">
            <input type="number" id="height-in" placeholder="in" min="0" max="11" style="width:70px;">
          </div>
        </div>

        <!-- Weight with unit toggle -->
        <div class="form-group">
          <label>Weight</label>
          <div id="weight-unit-buttons" class="unit-toggle">
            <button type="button" class="unit-btn active" data-unit="kg">kg</button>
            <button type="button" class="unit-btn" data-unit="lbs">lbs</button>
          </div>
          <input type="number" id="weight" placeholder="e.g. 75" min="20" max="500">
        </div>

        <!-- Age -->
        <div class="form-group">
          <label>Age</label>
          <input type="number" id="age" placeholder="e.g. 30" min="10" max="120">
        </div>

        <!-- Sex -->
        <div class="form-group">
          <label>Sex</label>
          <select id="sex">
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </div>

        <!-- Goal weight with unit toggle -->
        <div class="form-group">
          <label>Goal Weight</label>
          <div id="goal-unit-buttons" class="unit-toggle">
            <button type="button" class="unit-btn active" data-unit="kg">kg</button>
            <button type="button" class="unit-btn" data-unit="lbs">lbs</button>
          </div>
          <input type="number" id="goal-weight" placeholder="e.g. 70" min="20" max="400">
        </div>

        <!-- Activity Level -->
        <div class="form-group">
          <label>Activity Level</label>
          <select id="activity">
            <option value="1.2">Sedentary</option>
            <option value="1.375">Lightly active</option>
            <option value="1.55" selected>Moderately active</option>
            <option value="1.725">Very active</option>
            <option value="1.9">Extra active</option>
          </select>
        </div>

        <!-- Workout Days -->
        <div class="form-group">
          <label>Workout Days Per Week</label>
          <div style="display:flex;align-items:center;gap:12px;">
            <input type="range" id="workout-days" min="1" max="7" value="3">
            <span id="workout-days-value" style="font-weight:700;color:#3b82f6;min-width:20px;">3</span>
          </div>
        </div>

        <!-- Macros -->
        <div class="form-group">
          <label>Macros (Protein / Carbs / Fat %)</label>
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <input type="number" id="protein-pct" value="30" min="0" max="100" style="width:70px;">
            <input type="number" id="carbs-pct" value="40" min="0" max="100" style="width:70px;">
            <input type="number" id="fat-pct" value="30" min="0" max="100" style="width:70px;">
          </div>
          <span id="macro-sum" style="font-size:0.85rem;color:#64748b;">Total: 100%</span>
        </div>

        <button id="save-profile" class="btn btn-primary">Save Profile</button>
      </div>
    </div>

    <!-- Plan Tab -->
    <div id="tab-plan" class="tab-content">
      <div class="card">
        <h2>Your Plan</h2>
        <div id="plan-results">
          <div class="result-item"><span>BMR</span><span id="plan-bmr">—</span></div>
          <div class="result-item"><span>TDEE</span><span id="plan-tdee">—</span></div>
          <div class="result-item"><span>Target Calories</span><span id="plan-calories">—</span></div>
          <div class="result-item"><span>Protein</span><span id="plan-protein">—</span></div>
          <div class="result-item"><span>Carbs</span><span id="plan-carbs">—</span></div>
          <div class="result-item"><span>Fat</span><span id="plan-fat">—</span></div>
        </div>
      </div>
    </div>

    <!-- Schedule Tab -->
    <div id="tab-schedule" class="tab-content">
      <div class="card">
        <h2>Your Workout Schedule</h2>
        <div id="schedule-output">
          <p>Complete your profile to generate a workout schedule.</p>
        </div>
      </div>
    </div>

    <!-- Library Tab -->
    <div id="tab-library" class="tab-content">
      <div class="card">
        <h2>Exercise Library</h2>
        <div class="filter-bar">
          <input type="text" id="search-exercise" placeholder="Search exercises...">
          <select id="filter-muscle">
            <option value="">All Muscles</option>
            <option value="chest">Chest</option>
            <option value="back">Back</option>
            <option value="shoulders">Shoulders</option>
            <option value="arms">Arms</option>
            <option value="legs">Legs</option>
            <option value="core">Core</option>
            <option value="cardio">Cardio</option>
          </select>
          <select id="filter-equipment">
            <option value="">All Equipment</option>
            <option value="none">None</option>
            <option value="dumbbell">Dumbbell</option>
            <option value="barbell">Barbell</option>
            <option value="machine">Machine</option>
          </select>
        </div>
        <div id="exercise-grid" class="exercise-grid"></div>
      </div>

      <!-- ADD EXERCISE SECTION -->
      <div class="card">
        <h2>Add Your Own Exercise</h2>
        <form id="custom-exercise-form">
          <div class="form-group">
            <label>Exercise Name</label>
            <input type="text" id="cust-name" placeholder="e.g. Bulgarian Split Squats" required>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="cust-desc" placeholder="How to perform this exercise..." rows="2"></textarea>
          </div>
          <div class="form-group">
            <label>Muscle Group</label>
            <select id="cust-muscle">
              <option value="chest">Chest</option>
              <option value="back">Back</option>
              <option value="shoulders">Shoulders</option>
              <option value="arms">Arms</option>
              <option value="legs">Legs</option>
              <option value="core">Core</option>
              <option value="cardio">Cardio</option>
            </select>
          </div>
          <div class="form-group">
            <label>Equipment</label>
            <select id="cust-equipment">
              <option value="none">None</option>
              <option value="dumbbell">Dumbbell</option>
              <option value="barbell">Barbell</option>
              <option value="machine">Machine</option>
            </select>
          </div>
          <div class="form-group" style="display:flex; gap:12px; flex-wrap:wrap;">
            <div style="flex:1; min-width:100px;">
              <label>Reps / Time</label>
              <input type="text" id="cust-reps" placeholder="e.g. 12-15 reps or 30 sec" value="12-15 reps">
            </div>
            <div style="flex:1; min-width:80px;">
              <label>Sets</label>
              <input type="number" id="cust-sets" placeholder="3" value="3" min="1">
            </div>
            <div style="flex:1; min-width:80px;">
              <label>Rest</label>
              <input type="text" id="cust-rest" placeholder="e.g. 30 sec" value="30 sec">
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Add Exercise</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/tracker.js"></script>
</body>
</html>
