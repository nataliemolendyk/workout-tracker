<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Tracker</title>
  <link rel="stylesheet" href="css/tracker.css">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
<div class="container">
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="profile">Profile</button>
    <button class="tab-btn" data-tab="plan">My Plan</button>
    <button class="tab-btn" data-tab="schedule">Workout Schedule</button>
    <button class="tab-btn" data-tab="library">Exercise Library</button>
  </div>

  <!-- Profile Tab -->
  <div id="tab-profile" class="tab-content active">
    <div class="card">
      <h2>Your Profile</h2>
      
      <div class="form-group">
        <label>Height</label>
        <div class="unit-group">
          <input type="number" id="height" placeholder="e.g. 175" min="1" step="0.1">
          <div class="unit-buttons" id="height-unit-buttons">
            <button type="button" class="unit-btn active" data-unit="cm">cm</button>
            <button type="button" class="unit-btn" data-unit="ftin">ft/in</button>
          </div>
          <div id="height-ftin-inputs" style="display:none;" class="ftin-group">
            <input type="number" id="height-ft" placeholder="ft" min="1" max="8" style="width:70px;">
            <input type="number" id="height-in" placeholder="in" min="0" max="11" style="width:70px;">
          </div>
        </div>
      </div>
      
      <div class="form-group">
        <label>Weight</label>
        <div class="unit-group">
          <input type="number" id="weight" placeholder="e.g. 85" min="1" step="0.1">
          <div class="unit-buttons" id="weight-unit-buttons">
            <button type="button" class="unit-btn active" data-unit="kg">kg</button>
            <button type="button" class="unit-btn" data-unit="lbs">lbs</button>
          </div>
        </div>
      </div>
      
      <div class="form-group">
        <label>Age</label>
        <input type="number" id="age" placeholder="e.g. 25" min="18" max="100">
      </div>
      
      <div class="form-group">
        <label>Sex</label>
        <select id="sex">
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>Goal Weight</label>
        <div class="unit-group">
          <input type="number" id="goal-weight" placeholder="e.g. 75" min="20" max="400">
          <div class="unit-buttons" id="goal-unit-buttons">
            <button type="button" class="unit-btn active" data-unit="kg">kg</button>
            <button type="button" class="unit-btn" data-unit="lbs">lbs</button>
          </div>
        </div>
      </div>
      
      <div class="form-group">
        <label>Activity Level</label>
        <select id="activity">
          <option value="1.2">Sedentary (little or no exercise)</option>
          <option value="1.375">Lightly active (1-3 days/week)</option>
          <option value="1.55" selected>Moderately active (3-5 days/week)</option>
          <option value="1.725">Very active (6-7 days/week)</option>
          <option value="1.9">Extra active (intense daily)</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>Time Frame</label>
        <div class="radio-group">
          <label><input type="radio" name="timeframe" value="auto" checked> Auto-calculate (500 kcal deficit)</label>
          <label><input type="radio" name="timeframe" value="custom"> Custom deadline</label>
        </div>
        <div id="custom-weeks-group" style="display:none; margin-top:8px;">
          <input type="number" id="custom-weeks" placeholder="Weeks to reach goal" min="1" max="104">
        </div>
      </div>
      
      <div class="form-group">
        <label>Workout Days Per Week</label>
        <div style="display:flex; align-items:center; gap:12px;">
          <input type="range" id="workout-days" min="1" max="7" value="3">
          <span id="workout-days-value" style="font-weight:700; color:var(--accent);">3</span>
        </div>
      </div>
      
      <div class="form-group">
        <label>Macro Split</label>
        <label class="switch" style="margin-bottom:8px;">
          <input type="checkbox" id="macro-toggle" checked>
          <span class="slider"></span>
        </label>
        <span style="font-size:0.85rem; color:var(--text-secondary);">Custom split (default: 40/30/30)</span>
        <div id="macro-inputs-container" class="macro-inputs" style="margin-top:8px;">
          <input type="number" id="macro-protein" placeholder="Protein %" min="0" max="100" value="40">
          <input type="number" id="macro-carbs" placeholder="Carbs %" min="0" max="100" value="30">
          <input type="number" id="macro-fat" placeholder="Fat %" min="0" max="100" value="30">
        </div>
        <span id="macro-sum" style="font-size:0.9em; color:var(--text-secondary);">Total: 100%</span>
      </div>
      
      <div class="form-group">
        <label>Dark Mode</label>
        <label class="switch">
          <input type="checkbox" id="theme-toggle">
          <span class="slider"></span>
        </label>
      </div>
      
      <button id="save-profile" class="btn btn-primary">Save Profile</button>
    </div>
  </div>

  <!-- My Plan Tab -->
  <div id="tab-plan" class="tab-content">
    <div class="card">
      <h2>Your Plan</h2>
      <div id="plan-results">
        <div class="result-item"><span>BMR</span><span id="plan-bmr">—</span></div>
        <div class="result-item"><span>TDEE</span><span id="plan-tdee">—</span></div>
        <div class="result-item"><span>Daily Deficit</span><span id="plan-deficit">—</span></div>
        <div class="result-item"><span>Target Calories</span><span id="plan-calories">—</span></div>
        <div class="result-item"><span>Weekly Loss</span><span id="plan-weekly-loss">—</span></div>
        <div class="result-item"><span>Timeline</span><span id="plan-timeline">—</span></div>
        <div class="result-item"><span>Protein</span><span id="plan-protein">—</span></div>
        <div class="result-item"><span>Carbs</span><span id="plan-carbs">—</span></div>
        <div class="result-item"><span>Fat</span><span id="plan-fat">—</span></div>
      </div>
      <hr>
      <h3>Weight Progress</h3>
      <div class="progress-entry">
        <input type="date" id="progress-date">
        <input type="number" id="progress-weight" placeholder="Weight" step="0.1">
        <button id="log-weight" class="btn btn-primary">Log</button>
      </div>
      <div class="chart-container">
        <canvas id="weight-chart"></canvas>
      </div>
      <button id="download-plan-pdf" class="btn btn-primary">Download Plan as PDF</button>
    </div>
  </div>

  <!-- Workout Schedule Tab -->
  <div id="tab-schedule" class="tab-content">
    <div class="card">
      <h2>Your Workout Schedule</h2>
      <div id="schedule-output">
        <p>Complete your profile first.</p>
      </div>
      <button id="download-schedule-pdf" class="btn btn-primary">Download Schedule as PDF</button>
    </div>
  </div>

  <!-- Exercise Library Tab -->
  <div id="tab-library" class="tab-content">
    <div class="card">
      <h2>Exercise Library</h2>
      <div class="filter-bar">
        <input type="text" id="lib-search" placeholder="Search exercises...">
        <select id="lib-muscle">
          <option value="">All Muscle Groups</option>
          <option value="upper">Upper Body</option>
          <option value="lower">Lower Body</option>
          <option value="core">Core</option>
          <option value="cardio">Cardio</option>
          <option value="full_body">Full Body</option>
        </select>
        <select id="lib-equipment">
          <option value="">All Equipment</option>
          <option value="none">Bodyweight</option>
          <option value="dumbbell">Dumbbell</option>
          <option value="barbell">Barbell</option>
          <option value="machine">Machine</option>
          <option value="cardio_machine">Cardio Machine</option>
        </select>
      </div>
      <div id="exercise-grid" class="exercise-grid">
        <!-- Populated by JS -->
      </div>
      <hr>
      <h3>Add Custom Exercise</h3>
      <form id="custom-exercise-form">
        <div class="form-group">
          <label>Exercise Name</label>
          <input type="text" id="cust-name" placeholder="e.g. Bulgarian Split Squats" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="cust-desc" placeholder="How to perform..." rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>Muscle Group</label>
          <select id="cust-muscle">
            <option value="upper">Upper Body</option>
            <option value="lower">Lower Body</option>
            <option value="core">Core</option>
            <option value="cardio">Cardio</option>
            <option value="full_body">Full Body</option>
          </select>
        </div>
        <div class="form-group">
          <label>Equipment</label>
          <select id="cust-equipment">
            <option value="none">Bodyweight</option>
            <option value="dumbbell">Dumbbell</option>
            <option value="barbell">Barbell</option>
            <option value="machine">Machine</option>
            <option value="cardio_machine">Cardio Machine</option>
          </select>
        </div>
        <div class="form-group" style="display:flex; gap:12px; flex-wrap:wrap;">
          <div style="flex:1; min-width:120px;">
            <label>Reps</label>
            <input type="text" id="cust-reps" placeholder="e.g. 12-15" value="12-15">
          </div>
          <div style="flex:1; min-width:80px;">
            <label>Sets</label>
            <input type="number" id="cust-sets" placeholder="3" value="3" min="1">
          </div>
          <div style="flex:1; min-width:100px;">
            <label>Rest</label>
            <input type="text" id="cust-rest" placeholder="e.g. 30 sec" value="30 sec">
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Add Exercise</button>
      </form>
    </div>
  </div>
</div>

<script src="js/tracker.js"></script>
</body>
</html>
